apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: okard-frontend-uat
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: okard-frontend=ghcr.io/o-kard/okard-frontend
    argocd-image-updater.argoproj.io/okard-frontend.update-strategy: latest
    argocd-image-updater.argoproj.io/okard-frontend.allow-tags: regexp:^uat-.*$
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/o-kard/okard-frontend.git'
    targetRevision: dev
    path: k3s/overlays/uat
    kustomize: {}
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: uat
  syncPolicy:
    automated:
      prune: true
      selfHeal: true #Test Cache by Adding this annotation